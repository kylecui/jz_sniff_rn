# /etc/jz/base.yaml — Base configuration profile
---
version: 1

system:
  device_id: "jz-sniff-001"
  log_level: "info"                  # debug, info, warn, error
  mode: "bypass"                     # bypass, inline
  data_dir: "/var/lib/jz"
  run_dir: "/var/run/jz"
  interfaces:
    - name: "ens33"
      role: "monitor"                # monitor, manage, mirror
      subnet: "10.0.1.0/24"
  #  - name: "ens34"
  #    role: "manage"
  #    subnet: "192.168.1.0/24"
  #  - name: "ens35"
  #    role: "mirror"
  #    subnet: ""

modules:
  guard_classifier:
    enabled: true
    stage: 21
  arp_honeypot:
    enabled: true
    stage: 22
    rate_limit_pps: 100
    log_all: false
  icmp_honeypot:
    enabled: true
    stage: 23
    ttl: 64                          # Emulate Linux
    rate_limit_pps: 100
  sniffer_detect:
    enabled: true
    stage: 24
    probe_interval_sec: 30
    probe_count: 5                   # Number of probe IPs per cycle
  traffic_weaver:
    enabled: true
    stage: 25
    default_action: "pass"
  bg_collector:
    enabled: true
    stage: 26
    sample_rate: 1                   # 1 = every packet
    protocols:
      arp: true
      dhcp: true
      mdns: true
      ssdp: true
      lldp: true
      cdp: true
      stp: true
      igmp: true
  threat_detect:
    enabled: true
    stage: 27
  forensics:
    enabled: true
    stage: 28
    max_payload_bytes: 256
    sample_rate: 0                   # 0 = only sample flagged packets

guards:
  static: []
  #  - ip: "10.0.1.50"
  #    mac: "aa:bb:cc:dd:ee:01"     # Optional, use pool if omitted
  #    vlan: 0                       # 0 = all VLANs

  dynamic:
    auto_discover: true
    max_entries: 16384
    ttl_hours: 24                    # Auto-expire after 24h
    max_ratio: 30                    # Max % of subnet IPs as dynamic guards

  whitelist: []
  #  - ip: "10.0.1.1"
  #    mac: "00:11:22:33:44:55"
  #    match_mac: true

  frozen_ips: []
  #  - ip: "10.0.1.1"
  #    reason: "gateway"

discovery:
  aggressive_mode: false           # Send active DHCP DISCOVER probes
  dhcp_probe_interval_sec: 120     # Seconds between DHCP probe bursts

fake_mac_pool:
  prefix: "aa:bb:cc"                # OUI prefix for fake MACs
  count: 64                          # Number of fake MACs to generate

policies: []
  # - src_ip: "0.0.0.0"              # 0.0.0.0 = wildcard
  #   dst_ip: "10.0.1.50"
  #   src_port: 0                     # 0 = wildcard
  #   dst_port: 22
  #   proto: "tcp"
  #   action: "redirect"
  #   redirect_port: 8               # Interface index
  #   mirror_port: 0

policy_auto:
  enabled: true
  threshold: 5                        # Attack count before auto-policy
  window_sec: 300                     # Time window for threshold
  ttl_sec: 3600                       # Auto-policy expiry time
  max_auto_policies: 256
  default_action: "redirect"          # redirect, drop, mirror
  escalation: true                    # Escalate repeat offenders

threats:
  blacklist_file: "/etc/jz/blacklist.txt"  # One IP per line
  patterns: []
  #  - id: 1
  #    dst_port: 445
  #    proto: "tcp"
  #    threat_level: "high"
  #    action: "log_drop"
  #    description: "SMB exploit attempt"

collector:
  db_path: "/var/lib/jz/jz.db"
  max_db_size_mb: 512
  dedup_window_sec: 10
  rate_limit_eps: 1000               # Max events per second

uploader:
  enabled: false
  platform_url: ""
  interval_sec: 60
  batch_size: 1000
  tls_cert: ""
  tls_key: ""
  compress: true                     # gzip compression

log:
  format: "v2"                           # Default log format: v1 (KV) or v2 (JSON)
  heartbeat_interval_sec: 1800           # V1 syslog heartbeat interval
  syslog:
    enabled: false
    format: "v1"                         # Override per-transport
    server: ""                           # e.g. "10.0.1.100"
    port: 514
    facility: "local0"
  mqtt:
    enabled: false
    format: "v2"
    broker: ""                           # e.g. "tcp://10.0.1.100:1883"
    tls: false
    tls_ca: ""
    client_id: ""                        # Defaults to device_id at runtime
    topic_prefix: ""                     # e.g. "jz/{device_id}/logs"
    qos: 1
    keepalive_sec: 60
    heartbeat_interval_sec: 300          # MQTT heartbeat publish interval
    heartbeat_max_devices: 200
  https:
    enabled: false
    url: ""
    tls_cert: ""
    tls_key: ""
    interval_sec: 60
    batch_size: 1000
    compress: true

api:
  enabled: true
  listen: "0.0.0.0:8443"
  tls_cert: "/etc/jz/tls/server.crt"
  tls_key: "/etc/jz/tls/server.key"
  auth_tokens:
    - token: "changeme"              # CHANGE THIS — generate with: openssl rand -hex 32
      role: "admin"

vlans: []
#  - id: 10
#    name: "servers"
#    subnet: "10.10.0.0/24"
#  - id: 20
#    name: "clients"
#    subnet: "10.20.0.0/24"
